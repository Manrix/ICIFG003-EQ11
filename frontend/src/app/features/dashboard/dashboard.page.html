<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="header-brand">
      <div class="header-icon">📚</div>
      <h1>Gestión de Asistencia</h1>
    </div>
    <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
  </header>

  <div class="dashboard-body">
    <aside class="dashboard-sidebar">
      <app-curso-sidebar
        [cursos]="cursoService.cursos()"
        [selectedId]="selectedCursoId()"
        (selectCurso)="selectCurso($event)"
        (nuevoCurso)="openCursoForm()"
        (editarCurso)="openCursoForm($event)"
        (eliminarCurso)="deleteCurso($event)"
      />
    </aside>

    <main class="dashboard-main">
      <div class="main-content-wrapper">
        @if (selectedCurso(); as curso) {
          <div class="main-header">
            <h2 class="curso-title">{{ curso.nombre }}</h2>
            <span class="curso-badge">{{ curso.nivel }} · {{ curso.anio }}</span>
          </div>

          <div class="tabs-wrapper">
            <ul
              ngbNav
              #nav="ngbNav"
              [(activeId)]="activeTab"
              class="nav-tabs mb-3"
              (navChange)="changeTab($event.nextId)"
            >
              <li [ngbNavItem]="'alumnos'">
                <button ngbNavLink>Alumnos</button>
                <ng-template ngbNavContent>
                  <app-alumno-list
                    [alumnos]="alumnosDelCurso()"
                    [loading]="alumnoService.isLoading()"
                    (nuevoAlumno)="openAlumnoForm()"
                    (editarAlumno)="openAlumnoForm($event)"
                    (eliminarAlumno)="deleteAlumno($event)"
                    (verDetalle)="verDetalle($event)"
                  />
                </ng-template>
              </li>
              <li [ngbNavItem]="'asistencia'">
                <button ngbNavLink>Asistencia</button>
                <ng-template ngbNavContent>
                  <app-asistencia-table
                    [alumnos]="alumnosDelCurso()"
                    [registros]="asistenciaService.registros()"
                    [fecha]="selectedDate()"
                    [loading]="asistenciaService.isLoading()"
                    (cambiarEstado)="onCambiarEstado($event)"
                    (justificar)="openJustificativoForm($event)"
                    (fechaChange)="changeDate($event)"
                    (guardar)="guardarAsistencia()"
                  />
                </ng-template>
              </li>
            </ul>
            <div [ngbNavOutlet]="nav"></div>
          </div>
        } @else {
          <div class="empty-state">
            <div class="empty-card">
              <span class="empty-icon">🎓</span>
              <h3>Selecciona un curso</h3>
              <p>Elige un curso desde la barra lateral para ver alumnos y gestionar asistencia.</p>
            </div>
          </div>
        }
      </div>
    </main>
  </div>
</div>

@if (alumnoDetalle(); as alumno) {
  <app-alumno-detail
    [alumno]="alumno"
    [registros]="asistenciaService.registros()"
    [justificativos]="justificativosDetalle()"
    (cerrar)="cerrarDetalle()"
  />
}
