<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="input-group search-group">
    <span class="input-group-text">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        fill="currentColor"
        class="bi bi-search"
        viewBox="0 0 16 16"
      >
        <path
          d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.442 1.398a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"
        />
      </svg>
    </span>
    <input
      type="text"
      class="form-control"
      placeholder="Buscar alumno..."
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event).target.value)"
    />
  </div>
  <button class="btn btn-gold" (click)="nuevoAlumno.emit()">+ Nuevo Alumno</button>
</div>

@if (loading()) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>
} @else {
  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>RUT</th>
          <th>Estado</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (alumno of alumnosFiltrados(); track alumno.id) {
          <tr>
            <td>{{ alumno.nombre }}</td>
            <td>{{ alumno.apellido }}</td>
            <td>{{ alumno.rut }}</td>
            <td>
              <span
                class="badge"
                [class.bg-success]="alumno.estado === 'ACTIVO'"
                [class.bg-secondary]="alumno.estado !== 'ACTIVO'"
              >
                {{ alumno.estado }}
              </span>
            </td>
            <td class="text-end">
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-navy" (click)="verDetalle.emit(alumno.id)">
                  Detalle
                </button>
                <button class="btn btn-outline-navy" (click)="editarAlumno.emit(alumno)">
                  Editar
                </button>
                <button class="btn btn-outline-error" (click)="confirmDelete(alumno)">
                  Eliminar
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="text-center text-muted py-4">No se encontraron alumnos</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
