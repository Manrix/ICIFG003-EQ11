<h2 mat-dialog-title>Justificar Inasistencia</h2>

<mat-dialog-content>
  <div class="mb-3">
    <strong>Alumno:</strong> {{ data.alumnoNombre }}<br />
    <strong>Fecha:</strong> {{ data.registro.fecha }}
  </div>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="mb-3">
      <label for="motivo" class="form-label">Motivo</label>
      <textarea
        id="motivo"
        class="form-control"
        formControlName="motivo"
        rows="3"
        placeholder="Describa el motivo de la inasistencia"
      ></textarea>
      @if (form.controls.motivo.invalid && form.controls.motivo.touched) {
        <div class="form-text text-danger">El motivo es obligatorio (mínimo 5 caracteres).</div>
      }
    </div>

    <div class="mb-3">
      <label for="documento" class="form-label">Documento (opcional)</label>
      <input
        id="documento"
        type="text"
        class="form-control"
        formControlName="documento"
        placeholder="Nombre del archivo o enlace"
      />
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" class="btn btn-outline-navy" (click)="cancelar()">Cancelar</button>
  <button type="button" class="btn btn-gold" (click)="guardar()">
    Enviar Justificación
  </button>
</mat-dialog-actions>
